<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Encerrando…</title>

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7ff;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            padding: 3rem 4rem;
            box-shadow: 0 8px 32px rgba(108,63,197,0.12);
            text-align: center;
        }
        .icon { font-size: 3rem; margin-bottom: 1rem; }
        h1 { color: #3b1fa3; font-size: 1.6rem; margin-bottom: 0.5rem; }
        p  { color: #6b7280; font-size: 0.95rem; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">&#128190;</div>
        <h1>Dados salvos com sucesso</h1>
        <p>A aplicação foi encerrada. Pode fechar esta aba.</p>
    </div>
</body>
</html>
